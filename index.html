function hashStr(s) {

}
function seededRand(seed) {

}

function genProducts({ skuPrefix, label, count, colorStart = 0, startIndex = 0 }) {
  const products = [];
  for (let i = 0; i < count; i++) {
    const idx = startIndex + i;
    const styleName = STYLE_NAMES[idx % STYLE_NAMES.length];
    const repeat = Math.floor(idx / STYLE_NAMES.length);
    const suffix = repeat > 0 ? " " + (repeat + 1) : "";
    const sku = skuPrefix + "-" + String(idx + 1).padStart(3, "0");
    const seed = hashStr(sku);
    const pattern = SIZE_RUN.map((_, si) => {
      const roll = seededRand(seed + si * 11 + 3);
      return roll < 0.12 ? 0 : Math.round(roll * 9);
    });
    const published = seededRand(seed + 97) < 0.07 ? "Draft" : "Active";
    const color = COLOR_PALETTE[(colorStart + idx) % COLOR_PALETTE.length];
    products.push({ name: label + " " + styleName + suffix, sku, color, published, sizes: makeSizes(pattern) });
  }
  return products;
}

function totalStock(p) { return p.sizes.reduce((s, x) => s + x.qty, 0); }
function sizesInStock(p) { return p.sizes.filter((s) => s.qty > 0).length; }
function deriveSignals(p) {
  const seed = p.sku.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const total = totalStock(p);
  const unitsSold30d = Math.max(0, Math.round(total * 1.4 + (seed % 37)));
  const wideFitUnits = Math.min(total, Math.round(total * (0.25 + (seed % 60) / 100)));
  const wideFitPct = total === 0 ? 0 : Math.round((wideFitUnits / total) * 100);
  const price = (19.99 + (seed % 40)).toFixed(2);
  const performanceScore = (seed * 7) % 100;
  return { unitsSold30d, wideFitUnits, wideFitPct, price, performanceScore };
}
const LOW_STOCK_THRESHOLD = 8;
function stockStatus(total) { if (total === 0) return "out"; if (total < LOW_STOCK_THRESHOLD) return "low"; return "ok"; }
const STOCK_STYLES = {
  out: { label: "Out of stock", color: "#B43F2E", bg: "#FBEAE6" },
  low: { label: "Low stock", color: "#A06A1F", bg: "#FBF1E2" },
  ok: { label: "In stock", color: "#2F6F5E", bg: "#E8F2EE" },
};
const WIDE_FIT_STYLES = {
  good: { color: "#2F6F5E", bg: "#E8F2EE" },
  limited: { color: "#A06A1F", bg: "#FBF1E2" },
  poor: { color: "#B43F2E", bg: "#FBEAE6" },
};
function getWideFitLevel(pct) { if (pct >= 60) return "good"; if (pct >= 30) return "limited"; return "poor"; }
const SORT_OPTIONS = ["Manually", "Best selling", "Alphabetically A-Z", "Alphabetically Z-A"];
function getSortedSkus(sortType, products, currentOrder) {
  if (sortType === "Alphabetically A-Z") return [...products].sort((a, b) => a.name.localeCompare(b.name)).map((p) => p.sku);
  if (sortType === "Alphabetically Z-A") return [...products].sort((a, b) => b.name.localeCompare(a.name)).map((p) => p.sku);
  if (sortType === "Best selling") return products.map((p) => p.sku);
  return currentOrder;
}
function rebuildOrderAfterUnpinnedDrag(oldOrder, pinnedSkus, newUnpinnedSequence) {
  const queue = [...newUnpinnedSequence];
  return oldOrder.map((sku) => (pinnedSkus.includes(sku) ? sku : queue.shift()));
}

function StockBar({ total, max }) {
  const status = stockStatus(total);
  const pct = Math.min(100, Math.round((total / max) * 100));

    <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 110 }}>
      <div style={{ flex: 1, height: 6, borderRadius: 999, background: "#E5E7E1", overflow: "hidden" }}>

      </div>
      <span style={{ fontSize: 12, fontWeight: 600, color: "#1B231E", width: 26, textAlign: "right" }}>{total}</span>
    </div>
  );
}

function StockHealthChart({ collections }) {
  const perPage = 5;
  const [page, setPage] = useState(0);
  const totalPages = Math.max(1, Math.ceil(collections.length / perPage));
  const pageItems = collections.slice(page * perPage, page * perPage + perPage);

  return (
    <div style={{ flex: "1 1 320px", minWidth: 0, background: "#FFFFFF", border: "1px solid #E2E5E0", borderRadius: 10, padding: "16px 18px", display: "flex", flexDirection: "column" }}>
      <div style={{ fontSize: 14, fontWeight: 700, color: "#1B231E", marginBottom: 12 }}>Stock health by collection</div>
      <div style={{ flex: 1 }}>
        {pageItems.map((c) => {
          const out = c.products.filter((p) => stockStatus(totalStock(p)) === "out").length;
          const low = c.products.filter((p) => stockStatus(totalStock(p)) === "low").length;
          const ok = c.products.length - out - low;
          return (
            <div key={c.id} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                <span style={{ color: "#1B231E", fontWeight: 600 }}>{c.name}</span>
                <span style={{ color: "#9AA39B" }}>{c.products.length} products</span>
              </div>
              <div style={{ display: "flex", height: 10, borderRadius: 999, overflow: "hidden", background: "#EEF0EC" }}>
                {ok > 0 && <div style={{ flex: ok, background: "#2F6F5E" }} title={ok + " in stock"} />}
                {low > 0 && <div style={{ flex: low, background: "#A06A1F" }} title={low + " low stock"} />}
                {out > 0 && <div style={{ flex: out, background: "#B43F2E" }} title={out + " out of stock"} />}
              </div>
            </div>
          );

function formatMonthLabel(d) {
  return d.toLocaleDateString("en-GB", { month: "short" }) + " '" + String(d.getFullYear()).slice(-2);
}
function toDateInputValue(d) {
  return d.toISOString().slice(0, 10);
}
function monthsBack(n) {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() - (n - 1));
  return d;
}
function generateTrendData(startStr, endStr, avgPerf) {
  let start = new Date(startStr);
  let end = new Date(endStr);
  if (isNaN(start) || isNaN(end)) return [];
  if (start > end) { const tmp = start; start = end; end = tmp; }
  const points = [];
  let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
  const lastMonth = new Date(end.getFullYear(), end.getMonth(), 1);
  while (cursor <= lastMonth) {
    points.push(new Date(cursor));
    cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
  }
  if (points.length === 0) points.push(lastMonth);
  const n = points.length;
  const startVal = Math.max(5, avgPerf - 50);
  const endVal = Math.min(98, avgPerf + 35);
  return points.map((d, i) => {
    const t = n > 1 ? i / (n - 1) : 1;
    const eased = Math.pow(t, 1.6);
    const noise = Math.sin(i * 1.7) * 4;
    const value = Math.max(0, Math.min(100, Math.round(startVal + (endVal - startVal) * eased + noise)));
    return { label: formatMonthLabel(d), value };
  });
}

function SimulatedPerformanceTrend({ avgPerf }) {
  const [range, setRange] = useState(() => ({ start: toDateInputValue(monthsBack(8)), end: toDateInputValue(new Date()) }));
  const data = useMemo(() => generateTrendData(range.start, range.end, avgPerf), [range, avgPerf]);

  function applyPreset(months) {
    setRange({ start: toDateInputValue(monthsBack(months)), end: toDateInputValue(new Date()) });
  }

  const w = 640, h = 150, pad = 26;
  const points = data.map((d, i) => {
    const x = pad + (data.length > 1 ? (i / (data.length - 1)) * (w - pad * 2) : (w - pad * 2) / 2);
    const y = h - pad - (d.value / 100) * (h - pad * 2);
    return [x, y];
  });
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p[0] + "," + p[1]).join(" ");
  const dateInputStyle = { border: "1px solid #E2E5E0", borderRadius: 6, padding: "4px 6px", fontSize: 11.5, color: "#1B231E", background: "#FFFFFF" };
  const presetBtnStyle = { border: "1px solid #E2E5E0", background: "#FFFFFF", color: "#5B6760", borderRadius: 6, padding: "4px 8px", fontSize: 11, fontWeight: 600, cursor: "pointer" };

        <div style={{ display: "flex", gap: 4, marginLeft: "auto" }}>

        </div>
      </div>

          {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="#6B5B95" />)}
          {data.map((d, i) => <text key={i} x={points[i][0]} y={h - 6} fontSize="9" fill="#9AA39B" textAnchor="middle">{d.label}</text>)}
        </svg>

function CollectionDetail({ collection, order, onReorder, sortType, onSortChange, pinnedSkus, setPinnedSkus }) {
  const [query, setQuery] = useState("");
  const [lowStockOnly, setLowStockOnly] = useState(false);
  const [hideOutOfStock, setHideOutOfStock] = useState(false);
  const [hideDraft, setHideDraft] = useState(false);
  const [showPreview, setShowPreview] = useState(false);
  const [weightedPanelOpen, setWeightedPanelOpen] = useState(false);
  const [weights, setWeights] = useState({ pop: 25, inv: 25, wide: 25, perf: 25 });
  const dragIndexRef = useRef(null);
  const [overIndex, setOverIndex] = useState(null);

  const isManual = sortType === "Manually";
  const isFiltered = query.trim() !== "" || lowStockOnly || hideOutOfStock || hideDraft;
  const canDrag = isManual && !isFiltered;

  const maxStock = useMemo(() => Math.max(...collection.products.map(totalStock), 1), [collection]);
  const pinnedSet = useMemo(() => new Set(pinnedSkus), [pinnedSkus]);
  const unpinnedOrder = useMemo(() => order.filter((sku) => !pinnedSet.has(sku)), [order, pinnedSet]);
  const fullDisplayOrder = useMemo(() => [...pinnedSkus, ...unpinnedOrder], [pinnedSkus, unpinnedOrder]);

  const enrichedFull = useMemo(() => {
    return fullDisplayOrder.map((sku, idx) => {
      const p = collection.products.find((x) => x.sku === sku);
      const sig = deriveSignals(p);
      return { ...p, ...sig, total: totalStock(p), sizesIn: sizesInStock(p), position: idx + 1, pinned: pinnedSet.has(sku) };
    });
  }, [fullDisplayOrder, collection, pinnedSet]);

  const displayList = useMemo(() => {
    let list = enrichedFull;
    if (query.trim()) { const q = query.trim().toLowerCase(); list = list.filter((p) => p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)); }
    if (lowStockOnly) list = list.filter((p) => stockStatus(p.total) !== "ok");
    if (hideOutOfStock) list = list.filter((p) => stockStatus(p.total) !== "out");
    if (hideDraft) list = list.filter((p) => p.published !== "Draft");
    return list;
  }, [enrichedFull, query, lowStockOnly, hideOutOfStock, hideDraft]);

  function togglePin(sku) { setPinnedSkus((prev) => (prev.includes(sku) ? prev.filter((s) => s !== sku) : [...prev, sku])); }

  function handleAutoSortByInventory() {
    const sorted = [...collection.products].sort((a, b) => totalStock(b) - totalStock(a) || a.name.localeCompare(b.name)).map((p) => p.sku);
    onReorder(sorted); onSortChange("Manually");
  }
  function handleAutoSortByWideFit() {
    const sorted = [...collection.products].sort((a, b) => deriveSignals(b).wideFitUnits - deriveSignals(a).wideFitUnits || a.name.localeCompare(b.name)).map((p) => p.sku);
    onReorder(sorted); onSortChange("Manually");
  }
  function handleAutoSortByPerformance() {
    const sorted = [...collection.products].sort((a, b) => deriveSignals(b).performanceScore - deriveSignals(a).performanceScore || a.name.localeCompare(b.name)).map((p) => p.sku);
    onReorder(sorted); onSortChange("Manually");
  }
  function handleApplyWeightedSort() {
    const enriched = collection.products.map((p) => ({ p, sig: deriveSignals(p), stock: totalStock(p) }));
    const maxSold = Math.max(...enriched.map((e) => e.sig.unitsSold30d), 1);
    const maxStockAll = Math.max(...enriched.map((e) => e.stock), 1);
    const maxWide = Math.max(...enriched.map((e) => e.sig.wideFitUnits), 1);
    const maxPerf = Math.max(...enriched.map((e) => e.sig.performanceScore), 1);
    const sumW = weights.pop + weights.inv + weights.wide + weights.perf || 1;
    const scored = enriched.map((e) => ({
      sku: e.p.sku,
      score: (weights.pop / sumW) * (e.sig.unitsSold30d / maxSold) + (weights.inv / sumW) * (e.stock / maxStockAll) + (weights.wide / sumW) * (e.sig.wideFitUnits / maxWide) + (weights.perf / sumW) * (e.sig.performanceScore / maxPerf),
    })).sort((a, b) => b.score - a.score).map((e) => e.sku);
    onReorder(scored); onSortChange("Manually"); setWeightedPanelOpen(false);
  }

  function handleDragStart(index) { dragIndexRef.current = index; }
  function handleDragOver(e, index) { e.preventDefault(); setOverIndex(index); }
  function handleDrop(index) {
    const from = dragIndexRef.current;
    if (from === null || from === index) { setOverIndex(null); return; }
    const next = [...unpinnedOrder];
    const [moved] = next.splice(from, 1);
    next.splice(index, 0, moved);
    const rebuilt = rebuildOrderAfterUnpinnedDrag(order, pinnedSkus, next);
    onReorder(rebuilt);
    dragIndexRef.current = null;
    setOverIndex(null);
  }

  const sumW = weights.pop + weights.inv + weights.wide + weights.perf || 1;

  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: 20, display: "flex", gap: 16, alignItems: "flex-start" }}>
      <div style={{ flex: "1 1 600px", minWidth: 0, background: "#FFFFFF", border: "1px solid #E2E5E0", borderRadius: 10, overflow: "hidden" }}>
        <div style={{ padding: "16px 20px 14px" }}>
          <h2 style={{ fontSize: 16, fontWeight: 700, color: "#1B231E", margin: "0 0 12px" }}>Products</h2>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8 }}>
            <div style={{ position: "relative", display: "flex", alignItems: "center", border: "1px solid #D7DAD4", borderRadius: 8, padding: "8px 12px", fontSize: 13, flex: "1 1 180px" }}>
              <span style={{ color: "#5B6760", pointerEvents: "none" }}>Sort:&nbsp;</span>
              <select value={sortType} onChange={(e) => onSortChange(e.target.value)}
                style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontSize: 13, fontWeight: 600, color: "#1B231E", appearance: "none", WebkitAppearance: "none", cursor: "pointer", paddingRight: 20 }}>
                {SORT_OPTIONS.map((opt) => <option key={opt} value={opt}>{opt}</option>)}
              </select>
              <ArrowUpDown size={14} color="#9AA39B" style={{ position: "absolute", right: 12, pointerEvents: "none" }} />
            </div>
            <button onClick={handleAutoSortByInventory} style={{ display: "flex", alignItems: "center", gap: 7, border: "1px solid #2F6F5E", background: "#E8F2EE", color: "#2F6F5E", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              <ArrowDownWideNarrow size={15} /> Highest inventory
            </button>
            <button onClick={handleAutoSortByWideFit} style={{ display: "flex", alignItems: "center", gap: 7, border: "1px solid #2F6F5E", background: "#E8F2EE", color: "#2F6F5E", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              <ArrowDownWideNarrow size={15} /> Highest wide-fit stock
            </button>
            <button onClick={handleAutoSortByPerformance} style={{ display: "flex", alignItems: "center", gap: 7, border: "1px dashed #6B5B95", background: "#F4F1F9", color: "#6B5B95", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              <ArrowDownWideNarrow size={15} /> Highest performance (mock)
            </button>
            <button onClick={() => setWeightedPanelOpen((v) => !v)}
              style={{ display: "flex", alignItems: "center", gap: 7, border: weightedPanelOpen ? "1px solid #2F6F5E" : "1px solid #E2E5E0", background: weightedPanelOpen ? "#E8F2EE" : "#FFFFFF", color: weightedPanelOpen ? "#2F6F5E" : "#5B6760", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              <SlidersIcon size={14} /> Weighted sort
            </button>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, border: "1px solid #E2E5E0", borderRadius: 8, padding: "7px 10px", background: "#FFFFFF", flex: "1 1 180px" }}>
              <Search size={14} color="#9AA39B" />
              <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search product or SKU"
                style={{ border: "none", outline: "none", fontSize: 13, flex: 1, background: "transparent", color: "#1B231E" }} />
            </div>
            <button onClick={() => setLowStockOnly((v) => !v)}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, padding: "7px 12px", borderRadius: 8, border: lowStockOnly ? "1px solid #2F6F5E" : "1px solid #E2E5E0", background: lowStockOnly ? "#E8F2EE" : "#FFFFFF", color: lowStockOnly ? "#2F6F5E" : "#5B6760", cursor: "pointer", whiteSpace: "nowrap" }}>
              <AlertTriangle size={13} /> Low / out only
            </button>
            <button onClick={() => setHideOutOfStock((v) => !v)}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, padding: "7px 12px", borderRadius: 8, border: hideOutOfStock ? "1px solid #2F6F5E" : "1px solid #E2E5E0", background: hideOutOfStock ? "#E8F2EE" : "#FFFFFF", color: hideOutOfStock ? "#2F6F5E" : "#5B6760", cursor: "pointer", whiteSpace: "nowrap" }}>
              <CircleSlash size={13} /> Hide out of stock
            </button>
            <button onClick={() => setHideDraft((v) => !v)}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, padding: "7px 12px", borderRadius: 8, border: hideDraft ? "1px solid #2F6F5E" : "1px solid #E2E5E0", background: hideDraft ? "#E8F2EE" : "#FFFFFF", color: hideDraft ? "#2F6F5E" : "#5B6760", cursor: "pointer", whiteSpace: "nowrap" }}>
              <CircleSlash size={13} /> Hide draft
            </button>
            <button onClick={() => setShowPreview((v) => !v)}
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, padding: "7px 12px", borderRadius: 8, border: showPreview ? "1px solid #2F6F5E" : "1px solid #E2E5E0", background: showPreview ? "#E8F2EE" : "#FFFFFF", color: showPreview ? "#2F6F5E" : "#5B6760", cursor: "pointer", whiteSpace: "nowrap" }}>
              <EyeIcon size={13} /> {showPreview ? "Hide" : "Show"} preview
            </button>
            <a href={"https://widefitshoes.co.uk/collections/" + collection.id} target="_blank" rel="noopener noreferrer"
              style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 600, padding: "7px 12px", borderRadius: 8, border: "1px solid #E2E5E0", background: "#FFFFFF", color: "#5B6760", cursor: "pointer", whiteSpace: "nowrap", textDecoration: "none" }}>
              <ExternalLinkIcon size={13} /> Open page
            </a>
          </div>
          {weightedPanelOpen && (
            <div style={{ marginTop: 12, padding: 14, border: "1px solid #E2E5E0", borderRadius: 8, background: "#FAFBF9" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1B231E", marginBottom: 10 }}>Weighted sort — blend these factors</div>
              <WeightSlider label="Popularity (units sold, 30d)" value={weights.pop} onChange={(v) => setWeights((w) => ({ ...w, pop: v }))} />
              <WeightSlider label="Inventory level" value={weights.inv} onChange={(v) => setWeights((w) => ({ ...w, inv: v }))} />
              <WeightSlider label="Wide-fit availability" value={weights.wide} onChange={(v) => setWeights((w) => ({ ...w, wide: v }))} />
              <WeightSlider label="Performance score (mock data)" value={weights.perf} onChange={(v) => setWeights((w) => ({ ...w, perf: v }))} />
              <div style={{ fontSize: 11, color: "#5B6760", marginBottom: 10 }}>
                Normalized: Popularity {Math.round((weights.pop / sumW) * 100)}% &middot; Inventory {Math.round((weights.inv / sumW) * 100)}% &middot; Wide-fit {Math.round((weights.wide / sumW) * 100)}% &middot; Performance {Math.round((weights.perf / sumW) * 100)}%
              </div>
              <button onClick={handleApplyWeightedSort} style={{ border: "1px solid #2F6F5E", background: "#2F6F5E", color: "#FFFFFF", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Apply weighted sort</button>
            </div>
          )}
        </div>

        {!isManual && (
          <div style={{ display: "flex", alignItems: "flex-start", gap: 8, margin: "0 20px 14px", padding: "10px 12px", borderRadius: 8, background: "#FBF1E2", color: "#A06A1F", fontSize: 12, lineHeight: 1.4 }}>
            <Lock size={14} style={{ marginTop: 1, flexShrink: 0 }} />
            <span>This collection sorts by <strong>{sortType}</strong>. Switch to <strong>Manually</strong> to drag products into a new order.</span>
          </div>
        )}
        {isManual && isFiltered && (
          <div style={{ display: "flex", alignItems: "flex-start", gap: 8, margin: "0 20px 14px", padding: "10px 12px", borderRadius: 8, background: "#F6F7F5", color: "#5B6760", fontSize: 12, lineHeight: 1.4 }}>
            <Lock size={14} style={{ marginTop: 1, flexShrink: 0 }} />
            <span>Dragging is paused while a search or filter is active. Clear filters to reorder.</span>
          </div>
        )}

        <div style={{ display: "flex", alignItems: "flex-start", gap: 8, margin: "0 20px 14px", padding: "10px 12px", borderRadius: 8, background: "#F4F1F9", color: "#6B5B95", fontSize: 12, lineHeight: 1.4, border: "1px dashed #C9BEDB" }}>
          <SlidersIcon size={14} style={{ marginTop: 1, flexShrink: 0 }} />
          <span><strong>Performance</strong> scores below are placeholder mock data, not real analytics — they exist to test the UX before a real GA4-backed version is built.</span>
        </div>

        <div style={{ overflowX: "auto" }}>
          <div style={{ display: "grid", gridTemplateColumns: "22px 18px 18px 24px 42px minmax(220px,1fr) 78px 76px 90px 70px 100px 130px", gap: 8, padding: "8px 20px", background: "#F6F7F5", borderTop: "1px solid #E2E5E0", borderBottom: "1px solid #E2E5E0", fontSize: 11, fontWeight: 700, color: "#5B6760", textTransform: "uppercase", letterSpacing: "0.03em", alignItems: "center", minWidth: 850 }}>
            <span></span><span></span><span></span><span>#</span><span></span>
            <span>Product</span><span>Status</span><span>Wide fit</span><span>Performance</span><span>Sizes</span><span>Stock</span><span>Total units</span>
          </div>

          {displayList.length === 0 && <div style={{ padding: "24px 20px", textAlign: "center", fontSize: 13, color: "#9AA39B" }}>No products match this filter.</div>}

          {displayList.map((p, i) => {
            const dragIdx = i - pinnedSkus.length;
            const canDragThis = canDrag && !p.pinned;
            const isOver = canDragThis && overIndex === dragIdx;
            const stock = stockStatus(p.total);
            return (
              <div key={p.sku} draggable={canDragThis}
                onDragStart={() => canDragThis && handleDragStart(dragIdx)}
                onDragOver={(e) => canDragThis && handleDragOver(e, dragIdx)}
                onDrop={() => canDragThis && handleDrop(dragIdx)}
                onDragEnd={() => setOverIndex(null)}
                style={{ display: "grid", gridTemplateColumns: "22px 18px 18px 24px 42px minmax(220px,1fr) 78px 76px 90px 70px 100px 130px", gap: 8, padding: "10px 20px", alignItems: "center", borderBottom: i === displayList.length - 1 ? "none" : "1px solid #EEF0EC", background: isOver ? "#E8F2EE" : p.pinned ? "#FFFBF0" : "#FFFFFF", cursor: canDragThis ? "grab" : "default", transition: "background 120ms ease", minWidth: 850 }}>
                <button onClick={() => togglePin(p.sku)} title={p.pinned ? "Unpin" : "Pin to top"} style={{ display: "flex", justifyContent: "center", border: "none", background: "transparent", cursor: "pointer", padding: 0 }}>
                  <PinIcon size={14} color={p.pinned ? "#A06A1F" : "#C7CCC5"} fill={p.pinned ? "#A06A1F" : "none"} />
                </button>
                <span style={{ display: "flex", justifyContent: "center" }}>{canDragThis && <Grip size={16} color="#B7BCB4" />}</span>
                <input type="checkbox" style={{ width: 16, height: 16, accentColor: "#2F6F5E" }} />
                <span style={{ fontSize: 13, color: "#9AA39B" }}>{p.position}</span>
                <div style={{ width: 38, height: 38, borderRadius: 7, background: "#F1F2EF", border: "1px solid #E7E9E4", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: 22, height: 22, borderRadius: 5, background: p.color }} />
                </div>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: "#1B231E", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
                  <div style={{ fontSize: 11, color: "#9AA39B" }}>{p.sku}</div>
                </div>
                <PublishedBadge published={p.published} />
                <WideFitBadge pct={p.wideFitPct} />
                <PerformanceBadge score={p.performanceScore} />
                <span style={{ fontSize: 13, color: "#1B231E" }}>{p.sizesIn} / {p.sizes.length}</span>
                <StockBadge status={stock} />
                <StockBar total={p.total} max={maxStock} />
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 20px", background: "#F6F7F5", borderTop: "1px solid #E2E5E0" }}>
          <button disabled style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid #E2E5E0", background: "#FFFFFF", color: "#C7CCC5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "default" }}><ChevronLeft size={13} /></button>
          <button disabled style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid #E2E5E0", background: "#FFFFFF", color: "#C7CCC5", display: "flex", alignItems: "center", justifyContent: "center", cursor: "default" }}><ChevronLeft size={13} style={{ transform: "rotate(180deg)" }} /></button>
          <span style={{ fontSize: 13, color: "#5B6760" }}>{displayList.length === enrichedFull.length ? `1-${enrichedFull.length}` : `${displayList.length} of ${enrichedFull.length} shown`}</span>
        </div>
      </div>

      {showPreview && <StorefrontPreview items={displayList} />}
    </div>
  );
}

function CollectionInventoryTool() {
  const [selectedId, setSelectedId] = useState(null);
  const [order, setOrder] = useState([]);
  const [sortType, setSortType] = useState("Manually");
  const [pinnedByCollection, setPinnedByCollection] = useState({});
  const collection = COLLECTIONS.find((c) => c.id === selectedId);
  useEffect(() => {
    if (collection) {
      setOrder(collection.products.map((p) => p.sku));
      setSortType(collection.sortType === "Manual" ? "Manually" : collection.sortType);
    }
  }, [selectedId]);

  function handleSortChange(newSortType) {
    setSortType(newSortType);
    setOrder((current) => getSortedSkus(newSortType, collection.products, current));
  }

  function setPinnedSkusForCurrent(updater) {
    setPinnedByCollection((prev) => {
      const currentArr = prev[collection.id] || [];
      const next = typeof updater === "function" ? updater(currentArr) : updater;
      return { ...prev, [collection.id]: next };
    });
  }

  const pinnedTotal = Object.values(pinnedByCollection).reduce((sum, arr) => sum + arr.length, 0);

  return (
    <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif", background: "#F6F7F5", minHeight: "100vh", color: "#1B231E" }}>
      <AppHeader />
      {!collection ? <Dashboard onSelect={setSelectedId} pinnedTotal={pinnedTotal} /> : (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "14px 20px", borderBottom: "1px solid #E2E5E0", background: "#FFFFFF" }}>
            <button onClick={() => setSelectedId(null)} style={{ display: "flex", alignItems: "center", gap: 4, border: "none", background: "transparent", color: "#5B6760", fontSize: 13, fontWeight: 600, cursor: "pointer", padding: "4px 6px", borderRadius: 6 }}>
              <ChevronLeft size={15} /> All collections
            </button>
            <span style={{ color: "#C7CCC5" }}>/</span>
            <span style={{ fontSize: 13, fontWeight: 700, color: "#1B231E" }}>{collection.name}</span>
          </div>
          <CollectionDetail collection={collection} order={order} onReorder={setOrder} sortType={sortType} onSortChange={handleSortChange} pinnedSkus={pinnedByCollection[collection.id] || []} setPinnedSkus={setPinnedSkusForCurrent} />
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CollectionInventoryTool />);
</script>
</body>
</html>
